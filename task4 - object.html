    <script>

        // Obyektlərlə bağlı tapşırıqlar
        // name, age, city property-ləri olan obyekt yaradın.


        const myData = {
            name: "Mehri",
            age: 22,
            city: "Baku"
        }


        // Obyektdən name property-sini console-a çıxardın.

        console.log(myData.name); // Mehri

        // Obyektə yeni job property-si əlavə edin.

        myData.job = 'Frontend developer'

        // Obyektdə age dəyərini dəyişin.

        myData.age = 23
        // Obyektin bütün key-lərini çap edin. 
        console.log(Object.keys(myData)); // ["name","age","city","job"]

        // Obyektin bütün value-larını çap edin.
        console.log(Object.values(myData)); // ['Mehri', 23, 'Baku', 'Frontend developer']

        // Student obyektində average bal hesablayan funksiya yazın.

        const student = {
            name: 'Mehri',
            surname: "Alizada",
            points: [85, 90, 78, 92, 100],
            calculateAvarage: function () {
                if (this.points.length === 0) return 0;
                let sum = this.points.reduce((preVal, crrVal) => preVal + crrVal, 0)
                let avg = sum / this.points.length
                return avg
            }
        }

        console.log(student.name + " " + student.surname + ' adli telebenin umumi orta bali: ' + student.calculateAvarage());

        // Məhsul obyektində endirimli qiyməti hesablayın.

        const mehsul = {
            name: "Telefon",
            price: 1000,
            sale: 15,
            calculateSale: function () {
                let amount = this.price - (this.price * this.sale) / 100
                return amount
            }
        }

        console.log(mehsul.calculateSale());  // 850

        console.log(names); //['Lale', 'Jale', 'Nuray', 'Leman']

        }

        for (let item in user) {
            console.log(`${item}: ${user[item]}`);
        }

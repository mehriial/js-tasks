        // User obyektindən yalnız müəyyən property-ləri götürən funksiya yazın.
        const getProp = (obj, keys) => {
            return keys.reduce((acc, key) => {
                if (key in obj) acc[key] = obj[key];
                return acc;
            }, {});
        };
        const user3 = { name: 'Mehri', age: 22, email: "test@gmail.com" }

        // Obyekt içində duplicate value-ları tapın.

        function duplicateValueObj(obj) {
            let valueMap = Object.entries(obj).reduce((acc, [key, value]) => {
                if (!acc[value]) {
                    acc[value] = [];
                }
                acc[value].push(key);
                return acc;
            }, {});

            const duplicates = {};
            for (const [value, keys] of Object.entries(valueMap)) {

                if (keys.length > 1) {
                    duplicates[value] = keys;
                }
            }

            return Object.keys(duplicates);
        }

        const userRoles = {
            user1: "admin",
            user2: "editor",
            user3: "admin",
            user4: "guest",
            user5: "editor"
        };
        console.log(duplicateValueObj(userRoles));//['admin', 'editor']


        // Nested object-də bütün key-ləri array kimi qaytaran funksiya yazın.


        const getAllKeys = (obj) => {
            let keys = [];

            for (const key in obj) {
                keys.push(key)

                if (typeof obj[key] === 'object' && obj[key] !== null && !Array.isArray(obj[key])) {
                    keys = keys.concat(getAllKeys(obj[key]))
                }
            }

            return keys;
        };

                const key = obj[property];

                    acc[key] = [];
                }

                acc[key].push(obj);
                return acc;
            }, {});

        // Verilən ədədin faktorialını hesablayan funksiya yazın.
        function calculateFactorial(number) {
            let result = 1;
            if (number < 0) {
                console.log("Menfi ededin faktorialı yoxdur")

            } else {

        // Verilən array-dəki bütün ədədlərin cəmini reduce istifadə edərək hesablayan funksiya yazın.

        function sumArrayNumbers(arr) {
            return arr.reduce((acc, current) => {
                return acc + current;
            }, 0);
        }

        // String-də ən çox təkrarlanan hərfi tapan funksiya yazın.

        function getMaxRepeatingChar(text) {
            if (!text) return "";

            let charMap = {};
            let maxCount = 0;
            let maxChar = "";

            for (let char of text) {
                if (char === ' ') continue;

                charMap[char] = (charMap[char] || 0) + 1
            }

            for (let char in charMap) {
                if (charMap[char] > maxCount) {
                    maxCount = charMap[char]
                    maxChar = char
                }
            }

            return maxChar;
        }

        console.log(getMaxRepeatingChar("javascript")); // a


        // Verilən ədədin sadə olub olmadığını yoxlayan funksiya yazın.

        function checkPrimeNumber(number) {
            if (number <= 1) return false;
            if (number === 2) return true;
            if (number % 2 === 0) return false;
            if (number % number === 1 || number) {

                let radicand = Math.sqrt(number)
                for (let i = 3; i < radicand; i += 2) {
                    if (number % i !== 0) {
                        return true
                    } else return false
                }
            }
        }

        console.log(checkPrimeNumber(29));
        //true


        // Fibonacci ardıcıllığının ilk n elementini qaytaran funksiya yazın.

        function fibonacci(n) {
            if (n <= 0) return;
            if (n === 1) return [0];

            let arr = [0, 1]

            for (let i = 2; i < n; i++) {
                arr[i] = arr[i - 1] + arr[i - 2]
            }
            console.log(arr);
        }

        // Recursive factorial funksiyası yazın.


        function recursiveFactorial(x) {
            if (x === 1) return 1;

            return x * recursiveFactorial(x - 1)

        }

        console.log(recursiveFactorial(5));

    <script>

        // Qarışıq mini tapşırıqlar
        // Array qəbul edən funksiya yazın və ən kiçik elementi qaytarsın.
        function minVal(arr) {
            return arr.reduce((min, val) => {
                return min < val ? min : val
            })
        }

        let minValArr = [1, 3, 5, 8, 9, 11, 25]
        console.log(minVal(minValArr)); // 1





        // Obyekt qəbul edən funksiya yazın və məlumatı string kimi qaytarsın.

        function objectToString(obj) {
            return `Ad: ${obj.name}, Yas: ${obj.age}`;
        }

        const user = {
            name: "Mehri",
            age: 22,
        };

        console.log(objectToString(user)); // Ad: Mehri, Yas: 22

        // Array-dəki string-ləri böyük hərflə qaytaran funksiya yazın.
        const words = ["alma", "armud", "banan"];
        function upperStr(arr) {
            return arr.map(item => item.toUpperCase())
        }
        console.log(upperStr(words)); // ['ALMA', 'ARMUD', 'BANAN']


        // Calculator funksiyası yazın.


        function calc(num1, operator, num2) {
            let result;

            switch (operator) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    break;
                case '/':
                    if (num2 === 0) {
                        return "Xeta: sifira bolmek olmaz!";
                    }
                    result = num1 / num2;
                    break;
                default:
                    return "Xeta: Yanlis emeliyyat!";
            }

            return result;
        }
        console.log(calc(10, '+', 5)); // 15
        console.log(calc(20, '-', 8)); // 12
        console.log(calc(4, '*', 5));  // 20
        console.log(calc(10, '/', 2)); // 5


        // Verilən string-in palindrome olub olmadığını yoxlayın.

        function palindrome(text) {
            let reverseText = text.split('').reverse().join('')
            return text === reverseText;
        }

        console.log(palindrome('kok')); // true
        console.log(palindrome('salam')); // false


        // Array-dəki bütün ədədlərin ortalamasını tapın.


        const numbers = [10, 20, 30, 40];

        function avgNums(arr) {
            const sum = arr.reduce((acc, crr) => acc + crr, 0)
            return sum / arr.length
        }

        console.log(avgNums(numbers)); // 25



        // Verilən sözün neçə sait hərfdən ibarət olduğunu tapın.

        function countVowels(str) {
            const vowels = "aeiouəıöüAEIOUƏIÖÜ";
            let count = 0;

            for (let char of str) {
                if (vowels.includes(char)) {
                    count++;
                }
            }

            return count;
        }

        console.log(countVowels("salam dünya")); // 4

        // Verilən array-də yalnız unikal elementləri qaytaran funksiya yazın.



        const arr = [1, 2, 2, 3, 4, 4, 5];

        function uniqueElement(arr) {
            return [...new Set(arr)];
        }

        console.log(uniqueElement(arr)); // [1, 2, 3, 4, 5]


        // Obyektlər array-ində ən yüksək maaş alan şəxsi tapın.

        const employees = [
            { name: "Ali", salary: 1200 },
            { name: "Aysel", salary: 1500 },
            { name: "Murad", salary: 1100 }
        ];

        function highestSalary(arr) {
            return arr.reduce((max, emp) =>
                emp.salary > max.salary ? emp : max
            );
        }

        console.log(highestSalary(employees)); // { name: "Aysel", salary: 1500 }


        // İstifadəçinin yaşına görə “uşaq”, “gənc”, “böyük” qaytaran funksiya yazın.

        function userAge(age) {
            if (age <= 0) return 'yas 0 ola bilmez!'
            if (age > 25) {
                return 'böyük';
            } else if (age >= 18) {
                return 'genc';
            } else {
                return 'usaq';
            }
        }

        console.log(userAge(0)); // yas 0 ola bilmez!
        console.log(userAge(8)); // usaq
        console.log(userAge(80)); // boyuk
        console.log(userAge(16)); // genc
